    // Функция определения месяца по строке даты
    function getMonthKeyFromDate(dateStr) {
        const monthMap = { "января":"january", "февраля":"february", "марта":"march", "апреля":"april", "мая":"may", "июня":"june", "июля":"july", "августа":"august", "сентября":"september", "октября":"october", "ноября":"november", "декабря":"december" };
        const parts = dateStr.split(" ");
        if (parts.length < 2) return null;
        const monthName = parts[1];
        return monthMap[monthName] || null;
    }

    // Добавляем краеведческие события в соответствующие месяцы
    for (let ev of localEvents) {
        const monthKey = getMonthKeyFromDate(ev.date);
        if (monthKey && eventsData[monthKey]) {
            eventsData[monthKey].push(ev);
        } else {
            // Если не удалось определить месяц, пытаемся по ключевым словам
            if (ev.date.includes("июнь") && eventsData.june) eventsData.june.push(ev);
            else if (ev.date.includes("июль") && eventsData.july) eventsData.july.push(ev);
            else if (ev.date.includes("август") && eventsData.august) eventsData.august.push(ev);
            else if (ev.date.includes("сентябрь") && eventsData.september) eventsData.september.push(ev);
            else if (ev.date.includes("октябрь") && eventsData.october) eventsData.october.push(ev);
            else if (ev.date.includes("ноябрь") && eventsData.november) eventsData.november.push(ev);
            else if (ev.date.includes("декабрь") && eventsData.december) eventsData.december.push(ev);
            else if (ev.date.includes("1880") && eventsData.july) eventsData.july.push(ev);
            else if (ev.date.includes("1906") && eventsData.september) eventsData.september.push(ev);
            else if (ev.date.includes("1902") && eventsData.september) eventsData.september.push(ev);
            else if (ev.date.includes("1938") && eventsData.january) eventsData.january.push(ev);
        }
    }

    // Функция экспорта ICS
    function downloadICS(event) {
        const parts = event.date.split(" ");
        const day = parseInt(parts[0]);
        const monthName = parts[1];
        const monthMap = { "января":0, "февраля":1, "марта":2, "апреля":3, "мая":4, "июня":5, "июля":6, "августа":7, "сентября":8, "октября":9, "ноября":10, "декабря":11 };
        const month = monthMap[monthName];
        if (month === undefined) return;
        const startDate = new Date(2026, month, day);
        const endDate = new Date(startDate);
        endDate.setDate(startDate.getDate() + 1);
        const formatDate = (d) => d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
        const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Парголовская библиотека//Литературный календарь//RU
BEGIN:VEVENT
UID:${Date.now()}@parglbibl.ru
DTSTAMP:${formatDate(new Date())}
DTSTART:${formatDate(startDate)}
DTEND:${formatDate(endDate)}
SUMMARY:${event.title}
DESCRIPTION:${event.desc} ${event.local}
URL:${event.wiki || ''}
END:VEVENT
END:VCALENDAR`;
        const blob = new Blob([icsContent], { type: "text/calendar" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${event.title}.ics`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

        for (let month in eventsData) {
            eventsData[month].forEach(e => allEvents.push({ ...e, monthKey: month }));
        }
        allEvents.push(...bookAnniversaries.map(e => ({ ...e, monthKey: "book-anniversaries" })));

        let filtered = allEvents;
        if (currentSearch.trim() !== "") {
            const search = currentSearch.toLowerCase();
            filtered = filtered.filter(e =>
                e.title.toLowerCase().includes(search) ||
                (e.author && e.author.toLowerCase().includes(search)) ||
                e.desc.toLowerCase().includes(search)
            );
        }
        if (currentFilter !== "all") {
            filtered = filtered.filter(e => e.type === currentFilter);
        }

        const grouped = {};
        filtered.forEach(e => {
            if (!grouped[e.monthKey]) grouped[e.monthKey] = [];
            grouped[e.monthKey].push(e);
        });

        for (let month in eventsData) {
            const container = document.getElementById(month + "-events");
            if (container) {
                const monthEvents = grouped[month] || [];
                renderEventList(container, monthEvents);
            }
        }
        const bookContainer = document.getElementById("book-anniversaries-events");
        if (bookContainer) {
            const bookEvents = grouped["book-anniversaries"] || [];
            renderEventList(bookContainer, bookEvents);
        }
    }

    function renderEventList(container, events) {
        if (!events.length) {
            container.innerHTML = "<p>Нет событий, соответствующих фильтру.</p>";
            return;
        }
        let html = "";
        events.forEach(event => {
            const imageHtml = event.imageUrl
                ? `<div class="event-image"><img src="${event.imageUrl}" alt="${event.title}" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-image fallback-icon\'></i>'"></div>`
                : `<div class="event-image"><i class="fas fa-image fallback-icon"></i></div>`;
            const wikiLink = event.wiki ? `<a href="${event.wiki}" target="_blank"><i class="fab fa-wikipedia-w"></i> Википедия</a>` : "";
            const litresLink = event.litres ? `<a href="${event.litres}" target="_blank"><i class="fas fa-book"></i> Литрес</a>` : "";
            html += `
                <div class="event-card fade-in">
                    ${imageHtml}
                    <div class="event-date">${event.date}</div>
                    <div class="event-title">${event.title}</div>
                    <div class="event-author">${event.author || ''}</div>
                    <div class="event-desc">${event.desc}</div>
                    <div class="local-history"><i class="fas fa-map-pin"></i> ${event.local}</div>
                    <div class="event-links">
                        ${wikiLink}
                        ${litresLink}
                    </div>
                    <div class="event-share">
                        <button class="export-btn" onclick='downloadICS(${JSON.stringify(event)})'><i class="fas fa-calendar-plus"></i> Добавить в календарь</button>
                        <a href="https://vk.com/share.php?url=https://parglbibl.ru/literary-calendar.html&title=${encodeURIComponent(event.title)}&description=${encodeURIComponent(event.desc)}&image=https://parglbibl.ru/logo.PNG" target="_blank" class="share-btn-small"><i class="fab fa-vk"></i> Поделиться</a>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderTodayEvents() {
        const today = new Date();
        const currentDay = today.getDate();
        const currentMonthIndex = today.getMonth();
        const monthMap = { "января":0, "февраля":1, "марта":2, "апреля":3, "мая":4, "июня":5, "июля":6, "августа":7, "сентября":8, "октября":9, "ноября":10, "декабря":11 };
        const allEvents = [];
        for (let month in eventsData) {
            allEvents.push(...eventsData[month]);
        }
        allEvents.push(...bookAnniversaries);
        const todayEvents = allEvents.filter(event => {
            const parts = event.date.split(" ");
            if (parts.length < 2) return false;
            const day = parseInt(parts[0]);
            const monthName = parts[1];
            const eventMonth = monthMap[monthName];
            return day === currentDay && eventMonth === currentMonthIndex;
        });
        const container = document.getElementById("today-events-list");
        if (todayEvents.length === 0) {
            container.innerHTML = "<p>На сегодня литературных событий нет.</p>";
            return;
        }
        let html = "";
        todayEvents.forEach(event => {
            html += `<div class="today-event-item">
                        <strong>${event.date}</strong> – 
                        <a href="#">${event.title}</a>
                        <br><small>${event.author || ''}</small>
                     </div>`;
        });
        container.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderAllEvents();
        renderTodayEvents();

        const searchInput = document.getElementById("search-input");
        searchInput.addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderAllEvents();
        });

        const filterBtns = document.querySelectorAll(".filter-btn");
        filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                filterBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderAllEvents();
            });
        });
    });
</script>

    <style>
        .library-card {
            transition: transform 0.4s, box-shadow 0.4s;
        }
        .library-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }

        .section { padding: 4rem 0; }
        .libraries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .library-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;

        }
        .library-card h3 {
            color: #b5838d;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .library-address {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        .library-address i {
            color: #b5838d;
            width: 20px;
        }
        .library-phone {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        .library-phone i {
            color: #b5838d;
            width: 20px;
        }
        .library-link {
            display: inline-block;
            margin-top: 0.5rem;
            color: #e5989b;
            text-decoration: none;
            font-weight: 600;
        }
        .library-link:hover {
            text-decoration: underline;
        }
    </style>

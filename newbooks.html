            height: 2px;
            background-color: #f4e3d7;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav a:hover::after,
        .nav a.active::after {
            width: 100%;
        }
        .nav a:hover, .nav a.active {
            border-bottom: none;

            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
